name: 🚀 CS Launcher Manual Release Build

on:
  workflow_dispatch: # Ab yeh sirf tumhare manually button dabane par hi chalega
    inputs:
      tag_name:
        description: 'Release Version Tag (e.g., v2.0)'
        required: true
        default: 'v2.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildCS:
    name: 🔨 CS Launcher Manual Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Grant Permissions
        run: chmod +x gradlew

      - name: 📋 Build Info
        run: |
          echo "### 🚀 CS Launcher Manual Release" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ github.event.inputs.tag_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: 🧩 Build JRE Components
        run: |
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build \
            --no-daemon \
            --parallel \
            --build-cache

      - name: 📦 Build Debug APK
        run: |
          ./gradlew CS-Launcher:assembleDebug \
            -Darch=all \
            --no-daemon \
            --parallel \
            --build-cache \
            --stacktrace

      # ACTIONS MEIN UPLOAD NAHI HOGA. SEEDHA OFFICIAL RELEASE MEIN JAYEGA.
      - name: 🚀 Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: CS-Launcher/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.event.inputs.tag_name }}
          name: CS Launcher Release ${{ github.event.inputs.tag_name }}
          body: |
            ### CS Launcher Official Release
            * Ultra-optimized Minecraft Client.
            * Engineered for maximum FPS and stable RAM performance.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
